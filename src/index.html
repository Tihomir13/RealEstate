<!doctype html>
<html lang="bg" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>ИмотиПулс — цени на имоти в България</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Аналитичен барометър на жилищния пазар в България: цени на кв.м, наеми, доходност, достъпност и индекс на прегряване по градове и квартали.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;600;700&family=Sofia+Sans+Condensed:wght@400;700;800&display=swap" rel="stylesheet">
  <script>
    // Apply persisted theme before first paint to avoid flashing.
    try {
      var t = localStorage.getItem('imoti-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {}
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
