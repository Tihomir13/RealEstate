<a class="skip-link" href="#main">Към съдържанието</a>

<header class="site-header">
  <div class="container header-inner">
    <a routerLink="/" class="brand" aria-label="Имоти Пулс — начало">
      <span class="brand-mark" aria-hidden="true">▞</span>
      <span class="brand-name">Имоти<b>Пулс</b></span>
    </a>

    <button
      type="button"
      class="nav-toggle"
      (click)="navOpen.set(!navOpen())"
      [attr.aria-expanded]="navOpen()"
      aria-controls="site-nav"
      aria-label="Отвори менюто"
    >
      ☰
    </button>

    <nav id="site-nav" class="site-nav" [class.open]="navOpen()" aria-label="Основна навигация" (click)="navOpen.set(false)">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Обзор</a>
      <a routerLink="/gradove" routerLinkActive="active">Градове</a>
      <a routerLink="/sravnenie" routerLinkActive="active">Сравнение</a>
      <a routerLink="/obiavi" routerLinkActive="active">Обяви</a>
      <a routerLink="/metodologia" routerLinkActive="active">Методология</a>
    </nav>

    <button
      type="button"
      class="theme-toggle"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.theme() === 'dark' ? 'Светла тема' : 'Тъмна тема'"
    >
      {{ theme.theme() === 'dark' ? '☀' : '☾' }}
    </button>
  </div>
</header>

<main id="main" class="container">
  <router-outlet />
</main>

<footer class="site-footer">
  <div class="container">
    <p>
      ИмотиПулс — аналитичен барометър на жилищния пазар в България.
      Данните са синтетични (seed) и служат за демонстрация; интеграция с реални
      портали е предвидена като фаза 2.
    </p>
  </div>
</footer>
